<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="#2a0808"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="133" y1="0" x2="133" y2="225"/>
    <line x1="267" y1="0" x2="267" y2="225"/>
    <line x1="0"   y1="75"  x2="400" y2="75"/>
    <line x1="0"   y1="150" x2="400" y2="150"/>
  </g>

  <!-- Logo text -->
  <text
    x="200" y="124"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="900"
    font-size="72"
    fill="#e50914"
    text-anchor="middle"
    filter="url(#glow)"
    opacity="0.45"
    letter-spacing="-2"
  >MF</text>

  <!-- Subtle border -->
  <rect width="400" height="225" fill="none" stroke="rgba(229,9,20,0.12)" stroke-width="1"/>
</svg>
